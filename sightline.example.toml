[commands]
# Registers slash commands and message right-click commands on startup.
register_on_startup = true

[telemetry.dial9]
# Disabled in production by default. Enable during testing to write Dial9 trace
# segments to disk for post-hoc runtime/image-processing analysis.
enabled = false
trace_dir = "target/dial9-traces"
max_disk_usage_mb = 1024
rotation_seconds = 60
shutdown_timeout_seconds = 10
runtime_name = "discord-sightline"

[ocr_space]
# OCR.space API settings. The API key is read from OCR_SPACE_API_KEY.
# The real OCR API endpoint is api.ocr.space/parse/image; ocr.space/ocrapi is
# the documentation page.
endpoint = "https://api.ocr.space/parse/image"
timeout_seconds = 20
total_timeout_seconds = 30
max_retries = 3
retry_base_delay_ms = 750
language = "eng"
scale = true
detect_orientation = true
