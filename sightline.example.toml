[bot]
# Optional. Set this to the bot application's user ID to make permission
# diagnostics independent of the token's /users/@me identity lookup.
user_id = "1519891793934815415"

[queue]
# Runtime limits live here. Guild-specific config is stored in each guild's
# private #sightline-db channel and edited with /config.
max_size = 500
enqueue_timeout_ms = 50
# Shared CPU-bound budget for decode/hash and matcher work.
cpu_concurrency = 4
# Download IO budget. Image worker slots are derived from this so downloads can
# overlap while CPU-bound work remains capped by cpu_concurrency.
download_concurrency = 64
# OCR HTTP budget. OCR follow-ups are off the image worker hot path.
ocr_concurrency = 4
max_images_per_message = 10
# Process-wide, guild-scoped result cache. Capacity is shared by every guild.
hash_outcome_cache_size = 100000
# Process-wide reservation budget for downloaded bodies waiting on CPU work.
# Known content-length responses reserve their actual size; chunked responses
# reserve download.max_bytes. This prevents download bursts from exhausting RAM.
download_memory_max_bytes = 134217728
# Process-wide budget for decoded images. Each image reserves from its probed
# dimensions using a conservative whole-pipeline working-set estimate; staged
# images retain that reservation until local feature extraction finishes.
decoded_image_memory_max_bytes = 268435456
# Process-wide cap for original image bytes retained by OCR/specimen follow-ups.
byte_store_max_bytes = 67108864

[scan]
# Default for newly configured guilds and empty Advanced modal resets.
# Guild admins can edit scan_policy.exempt_administrators from /config -> Advanced.
exempt_administrators = true
# Escalate otherwise non-matching images in a confirmed scam message to suspicious.
# When the guild text gate is enabled, those sibling images are also sent to OCR.
mark_message_siblings_suspicious = true
# Default automated message scan image types for newly configured guilds.
# Guild admins can edit scan_policy.allowed_extensions from /config -> Advanced.
# Values are extension names without dots; jpeg is normalized to jpg.
allowed_extensions = ["jpg"]

[download]
# VM hard ceiling. Guild admins can set an equal-or-lower scan_policy.max_file_bytes
# value from /config.
max_bytes = 10485760
max_decoded_pixels = 12000000
timeout_seconds = 2
max_retries = 3
retry_base_delay_ms = 150
# Keep one Discord CDN HTTP/2 connection warm with a cheap HEAD request when
# real image traffic has not touched the host recently. The warm request uses
# the same reqwest client as image downloads and does not consume download
# concurrency permits.
warmer_enabled = true
warmer_period_seconds = 270

[download.preview]
# Prefer Discord-resized proxy previews for visual matching when metadata says
# the original is larger than the active normalized matching size. Exact-byte
# matching and OCR evidence stay original-image based. Image-backed specimen DB
# messages attach both the original and generated Discord preview variant.
enabled = true
mode = "match_normalized"
skip_animated = true
# Only request Discord proxy previews when the original is large enough that
# racing a resized proxy can plausibly beat the original download/decode path.
min_original_bytes = 262144

